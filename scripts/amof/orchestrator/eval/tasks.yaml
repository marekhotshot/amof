# Eval Task Definitions
# =====================
# Each task tests a specific capability of the agent / runner system.
# The eval harness runs each task, records success/failure/cost/latency,
# and generates a comparison report across model tiers.
#
# Fields:
#   id:              Unique task identifier.
#   description:     Natural-language task for the agent.
#   runner:          Which runner to use (code, k8s, helm, debug, or "master").
#   expected_tools:  Tools the agent should use (for scoring).
#   max_cost:        Maximum acceptable cost in USD.
#   timeout_s:       Maximum runtime in seconds.
#   success_check:   Optional regex matched against response to verify success.

tasks:
  # ---- File operations (code runner) ----
  - id: read-readme
    description: "Read the README.md file and summarize its contents in 3 bullet points."
    runner: code
    expected_tools: [Read]
    max_cost: 0.10
    timeout_s: 30

  - id: find-python-files
    description: "Find all Python files in scripts/ and list them."
    runner: code
    expected_tools: [Glob]
    max_cost: 0.05
    timeout_s: 20

  - id: search-import
    description: "Search for all files that import 'yaml' and list them."
    runner: code
    expected_tools: [Grep]
    max_cost: 0.05
    timeout_s: 20

  - id: list-directory
    description: "List the contents of the scripts/amof/orchestrator/ directory."
    runner: code
    expected_tools: [LS]
    max_cost: 0.05
    timeout_s: 15

  - id: read-config
    description: "Read .amof/agent.yaml and list all configuration keys."
    runner: code
    expected_tools: [Read]
    max_cost: 0.05
    timeout_s: 20

  # ---- Code analysis (code runner) ----
  - id: count-functions
    description: "Count the number of Python functions (def ...) in scripts/amof/orchestrator/agent.py."
    runner: code
    expected_tools: [Read, Grep]
    max_cost: 0.10
    timeout_s: 30

  - id: find-classes
    description: "Find all Python class definitions in scripts/amof/orchestrator/ and list class names."
    runner: code
    expected_tools: [Grep]
    max_cost: 0.10
    timeout_s: 30

  - id: analyze-imports
    description: "Read scripts/amof/orchestrator/model_router.py and list all its imports."
    runner: code
    expected_tools: [Read]
    max_cost: 0.08
    timeout_s: 25

  # ---- Code editing (code runner) ----
  - id: add-comment
    description: "Add a comment '# TODO: add unit tests' at the top of scripts/amof/orchestrator/telemetry.py (after the docstring)."
    runner: code
    expected_tools: [Read, StrReplace]
    max_cost: 0.15
    timeout_s: 45

  - id: create-file
    description: "Create a file at /tmp/amof-eval-test.txt with the content 'eval harness test'."
    runner: code
    expected_tools: [Write]
    max_cost: 0.05
    timeout_s: 20

  # ---- Shell operations ----
  - id: shell-echo
    description: "Run 'echo hello world' in the shell and return the output."
    runner: code
    expected_tools: [Shell]
    max_cost: 0.05
    timeout_s: 15
    success_check: "hello world"

  - id: shell-python-version
    description: "Run 'python3 --version' and return the Python version."
    runner: code
    expected_tools: [Shell]
    max_cost: 0.05
    timeout_s: 15
    success_check: "Python 3"

  # ---- K8s operations (k8s runner) ----
  - id: k8s-list-namespaces
    description: "List all Kubernetes namespaces."
    runner: k8s
    expected_tools: [K8s]
    max_cost: 0.10
    timeout_s: 30

  - id: k8s-list-pods
    description: "List all pods in the default namespace."
    runner: k8s
    expected_tools: [K8s]
    max_cost: 0.10
    timeout_s: 30

  # ---- Helm operations (helm runner) ----
  - id: helm-list-releases
    description: "List all Helm releases."
    runner: helm
    expected_tools: [Helm]
    max_cost: 0.10
    timeout_s: 30

  # ---- Multi-step tasks (master) ----
  - id: multi-read-analyze
    description: "Read scripts/amof/orchestrator/model_router.py and list the model tiers it supports."
    runner: master
    expected_tools: [Read]
    max_cost: 0.20
    timeout_s: 60

  - id: multi-search-explain
    description: "Search for 'estimate_cost' in the codebase, read the function, and explain what it does."
    runner: master
    expected_tools: [Grep, Read]
    max_cost: 0.25
    timeout_s: 60

  # ---- Complexity calibration ----
  - id: simple-question
    description: "What is 2+2?"
    runner: master
    expected_tools: []
    max_cost: 0.02
    timeout_s: 15
    success_check: "4"

  - id: complex-architecture
    description: "Analyze the architecture of the AMOF orchestrator. What are the main components and how do they interact? Suggest improvements."
    runner: master
    expected_tools: [Read, Grep, Glob, LS]
    max_cost: 0.50
    timeout_s: 120
